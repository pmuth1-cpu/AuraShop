<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aura Shop — Premium streetwear and lifestyle essentials. Shop the latest drops in Cambodia with fast Telegram checkout." />
  <meta name="theme-color" content="#8b5cf6" />
  <title>Aura Shop | Premium Streetwear & Lifestyle</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .initial-loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a11;display:flex;align-items:center;justify-content:center;z-index:9999}
    .initial-loader-content{display:flex;flex-direction:column;align-items:center;gap:20px}
    .initial-logo{font-family:'Outfit',sans-serif;font-size:3rem;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .initial-spinner{width:50px;height:50px;border:3px solid rgba(139,92,246,0.3);border-top-color:#8b5cf6;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hide-loader{opacity:0;transition:opacity 0.5s ease;pointer-events:none}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="initial-loader" class="initial-loader">
    <div class="initial-loader-content">
      <div class="initial-logo">AURA</div>
      <div class="initial-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.classList.add('hide-loader');
        setTimeout(() => loader.remove(), 500);
      }
    });
  </script>
</body>
</html>
