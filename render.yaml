services:
  - type: web
    name: aura-shop
    env: node
    buildCommand: npm run build
    startCommand: node server/index.js
    clearBuildCache: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: aura-shop-secret-key-2026-change-in-production
        helpText: Keep this stable; changing it invalidates all existing tokens.
      - key: PORT
        value: 5000